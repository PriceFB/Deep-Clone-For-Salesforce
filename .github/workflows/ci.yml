name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, org-free checks: formatting, linting, and LWC Jest unit tests.
  # This job needs no Salesforce org, so the CI badge stays meaningful on every push.
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify formatting (Prettier)
        run: npm run prettier:verify

      - name: Lint Lightning Web Components
        run: npm run lint

      - name: Run LWC Jest unit tests
        run: npm run test:unit:coverage

  # Optional: deploy to a scratch org and run the Apex test suite.
  # Runs only when a DEVHUB_SFDX_URL secret is configured (see README), so the
  # workflow still succeeds for contributors and forks without org credentials.
  scratch-org-apex-tests:
    name: Scratch Org Apex Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      DEVHUB_SFDX_URL: ${{ secrets.DEVHUB_SFDX_URL }}
    if: ${{ github.event_name == 'push' && github.actor != 'dependabot[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when no Dev Hub secret is configured
        id: guard
        run: |
          if [ -z "$DEVHUB_SFDX_URL" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No DEVHUB_SFDX_URL secret set; skipping scratch org tests."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Salesforce CLI
        if: steps.guard.outputs.run == 'true'
        run: npm install --global @salesforce/cli

      - name: Authenticate Dev Hub
        if: steps.guard.outputs.run == 'true'
        run: |
          echo "$DEVHUB_SFDX_URL" > ./DEVHUB_URL.txt
          sf org login sfdx-url --sfdx-url-file ./DEVHUB_URL.txt --set-default-dev-hub --alias devhub
          rm -f ./DEVHUB_URL.txt

      - name: Create scratch org
        if: steps.guard.outputs.run == 'true'
        run: sf org create scratch --definition-file config/project-scratch-def.json --alias ci-scratch --set-default --duration-days 1 --wait 10

      - name: Deploy source
        if: steps.guard.outputs.run == 'true'
        run: sf project deploy start --wait 30

      - name: Run Apex tests
        if: steps.guard.outputs.run == 'true'
        run: sf apex run test --test-level RunLocalTests --code-coverage --result-format human --wait 20

      - name: Delete scratch org
        if: always() && steps.guard.outputs.run == 'true'
        run: sf org delete scratch --target-org ci-scratch --no-prompt
